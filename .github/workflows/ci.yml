name: CI — Lint & Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Tests backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cocktail_user
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: cocktails_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://cocktail_user:testpassword@localhost:5432/cocktails_test_db
      DATABASE_TEST_URL: postgresql://cocktail_user:testpassword@localhost:5432/cocktails_test_db
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_test_secret
      NODE_ENV: test
      PORT: 3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Générer le client Prisma
        run: npx prisma generate

      - name: Appliquer les migrations
        run: npx prisma migrate deploy

      - name: Lancer les tests Jest
        run: npm test -- --forceExit --ci --verbose
